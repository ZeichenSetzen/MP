<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gebärden Video</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="dynamic-header" class="video-header">
        <h1 id="dynamic-title" class="video-title">Lade Video...</h1>
    </header>

    <main class="video-main">
        <video id="dynamic-video" class="portrait-video" controls autoplay loop muted playsinline>
            <source id="video-source" src="" type="video/mp4">
            Dein Browser unterstützt dieses Video leider nicht.
        </video>
    </main>

    <script>
        const videoDatenbank = {
            "1": {
                title: "Hallo",
                headerClass: "v-header-1",
                // FEHLER BEHOBEN: Das fehlende " am Ende wurde ergänzt.
                // OPTIMIERT: .mov in .mp4 geändert für alle Handys!
                url: "https://res.cloudinary.com/de3kjqa5o/video/upload/q_auto/f_auto/v1779868815/IMG_1176_khk2l7.mp4"
            },
            "2": {
                title: "Danke",
                headerClass: "v-header-2",
                url: "https://res.cloudinary.com/de3kjqa5o/video/upload/q_auto/f_auto/v1779868815/IMG_1177_a4sz0c.mp4"
            },
            "3": {
                title: "Bitte",
                headerClass: "v-header-3",
                url: "https://res.cloudinary.com/de3kjqa5o/video/upload/q_auto/f_auto/v1779868816/IMG_1179_ylhq9d.mp4"
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');

        if (videoId && videoDatenbank[videoId]) {
            const daten = videoDatenbank[videoId];
            
            document.getElementById('dynamic-title').innerText = daten.title;
            document.getElementById('dynamic-header').classList.add(daten.headerClass);
            
            const videoElement = document.getElementById('dynamic-video');
            document.getElementById('video-source').src = daten.url;
            videoElement.load();
            
            videoElement.play().catch(e => console.log("Autoplay blockiert, warte auf Interaktion."));
            
        } else {
            document.getElementById('dynamic-title').innerText = "Video nicht gefunden";
            document.getElementById('dynamic-header').classList.add("v-header-1");
            document.getElementById('dynamic-video').style.display = "none";
        }
    </script>
</body>
</html>
